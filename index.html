<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>مستقل - تطبيق الخدمات</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff;
      text-align: center;
    }

    .container {
      padding: 40px 20px;
    }

    .app-icon {
      width: 120px;
      height: 120px;
      border-radius: 20px;
      margin-top: 30px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    h1 {
      margin-top: 20px;
      font-size: 32px;
    }

    p {
      color: #cbd5e1;
      font-size: 16px;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      margin-top: 25px;
      padding: 12px 25px;
      background: #22c55e;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-size: 16px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #16a34a;
    }

    .box {
      margin-top: 40px;
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 15px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }

    footer {
      margin-top: 50px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- ضع صورة التطبيق هنا -->
    <img class="app-icon" src="icon.png" alt="App Icon">

    <h1>تطبيق مستقل</h1>

    <p>
      منصة خدمات إلكترونية تساعد المستخدمين على عرض مشاريعهم وخدماتهم والتواصل بسهولة.
      التطبيق يعمل بشكل سريع وخفيف ويوفر تجربة استخدام سلسة.
    </p>

    <a class="btn" href="app-release.apk" download>
      ⬇ تحميل التطبيق
    </a>

    <div class="box">
      <h3>مميزات التطبيق</h3>
      <p>
        ✔ واجهة بسيطة وسهلة<br>
        ✔ دعم تسجيل الدخول<br>
        ✔ عرض المشاريع والخدمات<br>
        ✔ أداء سريع وخفيف
      </p>
    </div>

    <footer>
      جميع الحقوق محفوظة © مستقل 2026
    </footer>

  </div>

</body>
</html>
